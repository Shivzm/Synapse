services:

  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092

  vespa:
    image: vespaengine/vespa
    ports:
      - "8080:8080"
      - "19071:19071"

  clickhouse:
    image: clickhouse/clickhouse-server
    ports:
      - "8123:8123"   # HTTP interface (use this in your Python config)
      - "9000:9000"   # native TCP interface
    environment:
      - CLICKHOUSE_DB=synapse           # auto-creates the database on startup
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=            # empty password for local dev
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  minio:
    image: minio/minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console (open http://localhost:9001 in browser)
    environment:
      - MINIO_ROOT_USER=minioadmin      # must match MINIO_ACCESS_KEY in .env
      - MINIO_ROOT_PASSWORD=minioadmin  # must match MINIO_SECRET_KEY in .env
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  clickhouse_data:
  minio_data: